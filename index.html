<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPG Map Printer - Proporção Perfeita</title>
    <style>
      /* --- ESTILOS DA INTERFACE (TELA) --- */
      :root {
        --primary: #5c2c16;
        --primary-hover: #7d3c1e;
        --bg-dark: #1e1e24;
        --bg-light: #2a2a35;
        --text-light: #f4f4f9;
        --accent: #d4a373;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-dark);
        color: var(--text-light);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      header {
        text-align: center;
        margin-bottom: 20px;
      }

      header h1 {
        color: var(--accent);
        margin-bottom: 5px;
        font-size: 2rem;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }

      .container {
        width: 100%;
        max-width: 1200px;
        background-color: var(--bg-light);
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        box-sizing: border-box;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 15px;
        margin-bottom: 15px;
        background: rgba(0, 0, 0, 0.2);
        padding: 20px;
        border-radius: 6px;
        border: 1px solid #444;
        align-items: flex-end;
      }

      .control-group {
        display: flex;
        flex-direction: column;
      }

      .control-group label {
        font-size: 0.85rem;
        margin-bottom: 8px;
        color: var(--accent);
        font-weight: bold;
        height: 18px;
      }

      .control-group input[type="number"],
      .control-group input[type="file"],
      .control-group select {
        padding: 10px;
        border-radius: 4px;
        border: 1px solid #555;
        background-color: #333;
        color: white;
        font-size: 0.95rem;
        box-sizing: border-box;
        height: 42px;
      }

      .control-group input[type="file"] {
        padding: 7px;
      }

      .btn-print {
        background-color: var(--primary);
        color: white;
        border: none;
        height: 42px;
        font-size: 1rem;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s;
        box-sizing: border-box;
      }

      .btn-print:hover:not(:disabled) {
        background-color: var(--primary-hover);
      }

      .btn-print:disabled {
        background-color: #444;
        color: #777;
        cursor: not-allowed;
      }

      .grid-info {
        background-color: rgba(212, 163, 115, 0.1);
        border-left: 4px solid var(--accent);
        padding: 12px;
        margin-bottom: 25px;
        border-radius: 0 4px 4px 0;
        font-size: 0.95rem;
        display: none;
      }

      /* --- CONTAINER DE PRÉVIA --- */
      .preview-section {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .preview-section h2 {
        color: var(--accent);
        margin-bottom: 15px;
      }

      #preview-grid {
        display: grid;
        gap: 15px;
        background-color: #111;
        padding: 15px;
        border-radius: 8px;
        border: 2px dashed #666;
        max-width: 100%;
        overflow-x: auto;
        box-sizing: border-box;
      }

      .preview-page {
        background-color: white;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
      }

      .preview-page.portrait {
        width: 180px;
        aspect-ratio: 210 / 297;
      }

      .preview-page.landscape {
        width: 254px;
        aspect-ratio: 297 / 210;
      }

      .preview-page-img {
        position: absolute;
        transform-origin: top left;
      }

      .overlap-mask {
        position: absolute;
        pointer-events: none;
        box-sizing: border-box;
        background-color: white;
        border: 1px dashed #777;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
        color: #555;
        font-family: sans-serif;
        overflow: hidden;
        z-index: 10;
      }

      /* --- ELEMENTOS DE IMPRESSÃO REAL --- */
      #print-container {
        display: none;
      }

      /* --- REGRAS DE IMPRESSÃO --- */
      @media print {
        body * {
          visibility: hidden;
        }
        #print-container,
        #print-container * {
          visibility: visible;
        }
        #print-container {
          display: block !important;
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          margin: 0;
          padding: 0;
          background: white;
        }
        .print-page {
          position: relative;
          page-break-after: always;
          overflow: hidden;
          box-sizing: border-box;
          background-color: white;
        }
        .print-page.portrait {
          width: 210mm;
          height: 297mm;
        }
        .print-page.landscape {
          width: 297mm;
          height: 210mm;
        }
        .print-page-img {
          position: absolute;
          transform-origin: top left;
        }
        .print-overlap-mask {
          position: absolute;
          pointer-events: none;
          box-sizing: border-box;
          background-color: white;
          border: 0.5mm dashed #999;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 8pt;
          color: #666;
          font-family: sans-serif;
          overflow: hidden;
          z-index: 10;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>RPG Map Printer</h1>
      <p>
        Divida seus mapas mantendo a proporção exata da imagem, sem esticar ou achatar.
      </p>
    </header>

    <div class="container">
      <div class="controls">
        <div class="control-group">
          <label for="map-upload">1. Upload do Mapa</label>
          <input type="file" id="map-upload" accept="image/*" />
        </div>

        <div class="control-group">
          <label for="orientation">2. Orientação do Papel</label>
          <select id="orientation">
            <option value="portrait">Retrato (A4 em pé)</option>
            <option value="landscape" selected>Paisagem (A4 deitado)</option>
          </select>
        </div>

        <div class="control-group">
          <label for="size-mode">3. Ajustar tamanho por</label>
          <select id="size-mode">
            <option value="cols" selected>Largura (Colunas)</option>
            <option value="rows">Altura (Linhas)</option>
          </select>
        </div>

        <div class="control-group">
          <label id="size-value-label" for="size-value">4. Qtd. de Páginas</label>
          <input type="number" id="size-value" value="3" min="1" />
        </div>

        <div class="control-group">
          <label for="overlap">5. Margem Adesiva (mm)</label>
          <input type="number" id="overlap" value="10" min="0" max="50" />
        </div>

        <button class="btn-print" id="btn-print-trigger" disabled>
          Imprimir Mapa
        </button>
      </div>

      <div id="grid-info" class="grid-info"></div>

      <div class="preview-section">
        <h2>Prévia de Impressão</h2>
        <p
          style="
            font-size: 0.9rem;
            color: var(--accent);
            margin-top: 0;
            margin-bottom: 15px;
          "
        >
          As áreas pontilhadas indicam onde as folhas se sobrepõem para colagem.
        </p>
        <div id="preview-grid">
          <p style="color: #888; padding: 20px">
            Faça o upload do seu mapa para visualizar a divisão proporcional das páginas.
          </p>
        </div>
      </div>
    </div>

    <div id="print-container"></div>

    <script>
      const mapUpload = document.getElementById("map-upload");
      const orientationInput = document.getElementById("orientation");
      const sizeModeInput = document.getElementById("size-mode");
      const sizeValueInput = document.getElementById("size-value");
      const sizeValueLabel = document.getElementById("size-value-label");
      const overlapInput = document.getElementById("overlap");
      const btnPrint = document.getElementById("btn-print-trigger");
      const previewGrid = document.getElementById("preview-grid");
      const printContainer = document.getElementById("print-container");
      const gridInfo = document.getElementById("grid-info");

      let uploadedImageSrc = "";
      let originalWidth = 0;
      let originalHeight = 0;

      const stylePageElement = document.createElement("style");
      document.head.appendChild(stylePageElement);

      mapUpload.addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (event) {
          const img = new Image();
          img.onload = function () {
            uploadedImageSrc = event.target.result;
            originalWidth = img.width;
            originalHeight = img.height;
            btnPrint.disabled = false;
            renderMapPages();
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });

      sizeModeInput.addEventListener("change", () => {
        if (sizeModeInput.value === "cols") {
          sizeValueLabel.innerText = "4. Largura (Páginas)";
        } else {
          sizeValueLabel.innerText = "4. Altura (Páginas)";
        }
        if (uploadedImageSrc) renderMapPages();
      });

      [orientationInput, sizeValueInput, overlapInput].forEach((input) => {
        input.addEventListener("input", () => {
          if (uploadedImageSrc) renderMapPages();
        });
      });

      btnPrint.addEventListener("click", () => {
        window.print();
      });

      function renderMapPages() {
        const orientation = orientationInput.value;
        const sizeMode = sizeModeInput.value;
        const sizeValue = parseInt(sizeValueInput.value) || 1;
        const overlapMm = parseInt(overlapInput.value) || 0;

        previewGrid.innerHTML = "";
        printContainer.innerHTML = "";

        const isLandscape = orientation === "landscape";
        const a4WidthMm = isLandscape ? 297 : 210;
        const a4HeightMm = isLandscape ? 210 : 297;
        const previewWidthPx = isLandscape ? 254 : 180;

        stylePageElement.innerHTML = `@media print { @page { size: A4 ${orientation}; margin: 0; } }`;

        const imgAspectRatio = originalWidth / originalHeight;

        let cols = 1;
        let rows = 1;
        let totalWidthMm = 0;
        let totalHeightMm = 0;

        // MATEMÁTICA CORRIGIDA (ESTILO RASTERBATOR):
        // 1. Definimos o tamanho físico em mm com base na quantidade de páginas desejadas em um dos eixos
        // 2. Usamos a proporção exata da imagem para obter o tamanho do outro eixo
        // 3. Calculamos exatamente quantas páginas são necessárias para cobrir o segundo eixo sem distorcer nada
        if (sizeMode === "cols") {
          cols = sizeValue;
          totalWidthMm = cols * a4WidthMm - (cols - 1) * overlapMm;
          totalHeightMm = totalWidthMm / imgAspectRatio;
          rows = Math.ceil((totalHeightMm - overlapMm) / (a4HeightMm - overlapMm));
          if (rows < 1) rows = 1;
        } else {
          rows = sizeValue;
          totalHeightMm = rows * a4HeightMm - (rows - 1) * overlapMm;
          totalWidthMm = totalHeightMm * imgAspectRatio;
          cols = Math.ceil((totalWidthMm - overlapMm) / (a4WidthMm - overlapMm));
          if (cols < 1) cols = 1;
        }

        // Mostra informações físicas reais calculadas do mapa
        const finalWidthCm = (totalWidthMm / 10).toFixed(1);
        const finalHeightCm = (totalHeightMm / 10).toFixed(1);
        gridInfo.style.display = "block";
        gridInfo.innerHTML = `<strong>Dimensões Finais do Mapa:</strong> ${finalWidthCm} x ${finalHeightCm} cm (Grid de <strong>${cols} colunas</strong> por <strong>${rows} linhas</strong> — Total: <strong>${cols * rows} folhas A4</strong>).`;

        previewGrid.style.gridTemplateColumns = `repeat(${cols}, ${previewWidthPx}px)`;

        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const posX = c * (a4WidthMm - overlapMm);
            const posY = r * (a4HeightMm - overlapMm);

            // --- 1. PRÉVIA EM TELA (CSS RELATIVO AO CONTAINER DO CARD) ---
            const previewPage = document.createElement("div");
            previewPage.classList.add("preview-page", orientation);

            const previewImg = document.createElement("img");
            previewImg.src = uploadedImageSrc;
            previewImg.classList.add("preview-page-img");

            const previewScale = previewWidthPx / a4WidthMm;

            // Mantém a proporção perfeita definindo a largura e altura com base no MESMO fator de escala
            previewImg.style.width = `${totalWidthMm * previewScale}px`;
            previewImg.style.height = `${totalHeightMm * previewScale}px`;
            previewImg.style.left = `-${posX * previewScale}px`;
            previewImg.style.top = `-${posY * previewScale}px`;

            previewPage.appendChild(previewImg);

            if (overlapMm > 0) {
              createOverlapMasks(previewPage, r, c, rows, cols, overlapMm, previewScale, false);
            }

            previewGrid.appendChild(previewPage);

            // --- 2. PÁGINA DE IMPRESSÃO (A4 REAL) ---
            const printPage = document.createElement("div");
            printPage.classList.add("print-page", orientation);

            const printImg = document.createElement("img");
            printImg.src = uploadedImageSrc;
            printImg.classList.add("print-page-img");

            // Define as dimensões reais de escala sem distorção
            printImg.style.width = `${totalWidthMm}mm`;
            printImg.style.height = `${totalHeightMm}mm`;
            printImg.style.left = `-${posX}mm`;
            printImg.style.top = `-${posY}mm`;

            printPage.appendChild(printImg);

            if (overlapMm > 0) {
              createOverlapMasks(printPage, r, c, rows, cols, overlapMm, 1, true);
            }

            printContainer.appendChild(printPage);
          }
        }
      }

      function createOverlapMasks(parentPage, r, c, maxRows, maxCols, overlap, scale, isPrint) {
        const unit = isPrint ? "mm" : "px";
        const className = isPrint ? "print-overlap-mask" : "overlap-mask";

        // Margem de colagem à direita (se não for a última coluna do grid)
        if (c < maxCols - 1) {
          const rightMask = document.createElement("div");
          rightMask.classList.add(className);
          rightMask.style.top = "0";
          rightMask.style.right = "0";
          rightMask.style.width = `${overlap * scale}${unit}`;
          rightMask.style.height = "100%";
          if (!isPrint) rightMask.innerText = "COLA";
          parentPage.appendChild(rightMask);
        }

        // Margem de colagem inferior (se não for a última linha do grid)
        if (r < maxRows - 1) {
          const bottomMask = document.createElement("div");
          bottomMask.classList.add(className);
          bottomMask.style.bottom = "0";
          bottomMask.style.left = "0";
          bottomMask.style.width = "100%";
          bottomMask.style.height = `${overlap * scale}${unit}`;
          if (!isPrint) bottomMask.innerText = "COLA";
          parentPage.appendChild(bottomMask);
        }
      }
    </script>
  </body>
</html>
